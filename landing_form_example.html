<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>메디스파크 상담 연동 예시</title>
  <style>
    :root {
      --bg: #f3f7fb;
      --panel: #ffffff;
      --ink: #102033;
      --sub: #5c6b7a;
      --line: #d8e2ec;
      --brand: #0f5fa8;
      --brand-dark: #0a4174;
      --accent: #eef6ff;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Pretendard", "Noto Sans KR", sans-serif;
      background: linear-gradient(180deg, #edf5fb 0%, #f8fbfd 100%);
      color: var(--ink);
    }

    .wrap {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .card {
      width: min(100%, 460px);
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 24px;
      padding: 28px;
      box-shadow: 0 16px 40px rgba(16, 32, 51, 0.08);
    }

    .eyebrow {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 999px;
      background: var(--accent);
      color: var(--brand);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    h1 {
      margin: 14px 0 10px;
      font-size: 28px;
      line-height: 1.2;
    }

    .sub {
      margin: 0 0 18px;
      color: var(--sub);
      line-height: 1.6;
      font-size: 15px;
    }

    .guide {
      margin: 0 0 18px;
      padding: 14px;
      border-radius: 16px;
      background: #f8fbff;
      border: 1px solid #d9e9fb;
      color: #35506c;
      font-size: 14px;
      line-height: 1.6;
    }

    label {
      display: block;
      margin: 14px 0 8px;
      font-size: 14px;
      font-weight: 700;
    }

    input[type="text"],
    input[type="tel"] {
      width: 100%;
      height: 52px;
      padding: 0 16px;
      border: 1px solid var(--line);
      border-radius: 14px;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s ease;
    }

    input:focus {
      border-color: var(--brand);
    }

    .consent {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      margin-top: 16px;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: #fbfdff;
      font-size: 13px;
      color: var(--sub);
      line-height: 1.5;
    }

    .cta {
      margin-top: 18px;
      width: 100%;
      height: 54px;
      border: 0;
      border-radius: 16px;
      background: linear-gradient(135deg, var(--brand) 0%, var(--brand-dark) 100%);
      color: #fff;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
    }

    .cta[disabled] {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .note {
      margin-top: 12px;
      text-align: center;
      font-size: 12px;
      color: var(--sub);
    }

    .status {
      min-height: 22px;
      margin-top: 12px;
      font-size: 13px;
      color: var(--brand-dark);
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <span class="eyebrow">빠른 상담 연결</span>
      <h1>상담하기</h1>
      <p class="sub">성함과 연락처만 남겨주시면 빠르게 상담 연결을 도와드립니다.</p>

      <div class="guide">
        상담 요청 확인을 위한 최소 정보만 받고 있습니다.<br>
        남겨주신 정보는 요청하신 상담 진행 외 다른 용도로 사용되지 않습니다.
      </div>

      <form
        id="leadForm"
        action="YOUR_GOOGLE_APPS_SCRIPT_WEBAPP_URL"
        method="post"
        target="submitFrame"
      >
        <label for="name">이름</label>
        <input id="name" name="name" type="text" placeholder="성함을 입력해 주세요" required>

        <label for="phone">연락처</label>
        <input id="phone" name="phone" type="tel" placeholder="연락처를 입력해 주세요" inputmode="numeric" required>

        <input type="hidden" name="developer" value="이신우">
        <input type="hidden" name="inquiryType" value="phone_call">
        <input type="hidden" name="unitType" value="">
        <input type="hidden" name="visitDateTime" value="">
        <input type="hidden" name="pageUrl" id="pageUrl">
        <input type="hidden" name="device" id="device">
        <input type="hidden" name="createdAt" id="createdAt">
        <input type="hidden" name="consent" id="consentValue" value="N">

        <label class="consent">
          <input id="consent" type="checkbox" required>
          <span>개인정보 수집 및 이용에 동의합니다. 입력하신 정보는 상담 진행 목적으로만 사용됩니다.</span>
        </label>

        <button id="submitButton" class="cta" type="submit">정보 남기고 전화 연결하기</button>
      </form>

      <div id="status" class="status"></div>
      <div class="note">연결이 되지 않으면 010-6689-2348로 직접 전화 부탁드립니다.</div>
    </div>
  </div>

  <iframe name="submitFrame" title="hidden submit frame" style="display:none;"></iframe>

  <script>
    (function () {
      var form = document.getElementById("leadForm");
      var button = document.getElementById("submitButton");
      var status = document.getElementById("status");
      var consent = document.getElementById("consent");
      var consentValue = document.getElementById("consentValue");
      var pageUrl = document.getElementById("pageUrl");
      var device = document.getElementById("device");
      var createdAt = document.getElementById("createdAt");
      var phoneInput = document.getElementById("phone");

      pageUrl.value = window.location.href;
      device.value = window.innerWidth <= 768 ? "mobile" : "desktop";

      phoneInput.addEventListener("input", function () {
        var cleaned = phoneInput.value.replace(/[^0-9]/g, "").slice(0, 11);
        if (cleaned.length < 4) {
          phoneInput.value = cleaned;
          return;
        }
        if (cleaned.length < 8) {
          phoneInput.value = cleaned.replace(/(\d{3})(\d+)/, "$1-$2");
          return;
        }
        phoneInput.value = cleaned.replace(/(\d{3})(\d{3,4})(\d+)/, "$1-$2-$3");
      });

      form.addEventListener("submit", function (event) {
        event.preventDefault();

        if (!form.reportValidity()) {
          return;
        }

        consentValue.value = consent.checked ? "Y" : "N";
        createdAt.value = new Date().toISOString();

        button.disabled = true;
        status.textContent = "상담 접수 중입니다. 잠시 후 전화 연결됩니다.";

        form.submit();

        window.setTimeout(function () {
          status.textContent = "전화 앱으로 연결 중입니다.";
          window.location.href = "tel:01066892348";
        }, 800);

        window.setTimeout(function () {
          button.disabled = false;
        }, 2500);
      });
    })();
  </script>
</body>
</html>
